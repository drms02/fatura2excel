services:
  - type: web
    name: fatura2excel-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://fatura2excel.vercel.app
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_DOMAIN
        sync: false

